services:
  - type: web
    name: family-video-share
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: MAX_UPLOAD_BYTES
        value: 21474836480
      - key: SHARE_PASSWORD
        sync: false
    disk:
      name: videos
      mountPath: /var/data
      sizeGB: 20
